name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Android project
        run: |
          rm -rf app build.gradle settings.gradle gradle.properties

          mkdir -p app/src/main/java/com/salmoit/yugiohwatcher

          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'YuGiOhPreorderWatcher'
          include ':app'
          EOF

          cat > build.gradle <<'EOF'
          plugins {
              id 'com.android.application' version '8.7.3' apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          EOF

          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.salmoit.yugiohwatcher'
              compileSdk 35

              defaultConfig {
                  applicationId 'com.salmoit.yugiohwatcher'
                  minSdk 23
                  targetSdk 35
                  versionCode 3
                  versionName '1.3'
              }
          }

          dependencies {
              implementation 'org.jsoup:jsoup:1.17.2'
              implementation 'androidx.work:work-runtime:2.9.1'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />

              <application
                  android:theme="@style/AppTheme"
                  android:label="YuGiOh Watcher"
                  android:allowBackup="false"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          mkdir -p app/src/main/res/values
          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">true</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/java/com/salmoit/yugiohwatcher/Site.java <<'EOF'
          package com.salmoit.yugiohwatcher;

          public class Site {
              public final String name;
              public final String url;

              public Site(String name, String url) {
                  this.name = name;
                  this.url = url;
              }
          }
          EOF

          cat > app/src/main/java/com/salmoit/yugiohwatcher/CheckResult.java <<'EOF'
          package com.salmoit.yugiohwatcher;

          public class CheckResult {
              public static final String GOOD = "PREZZO OK";
              public static final String EXPENSIVE = "CARO";
              public static final String SOLD_OUT = "SOLD OUT";
              public static final String NOT_FOUND = "NON TROVATO";
              public static final String MAYBE = "DA CONTROLLARE";
              public static final String ERROR = "ERRORE";

              public final Site site;
              public final String status;
              public final Integer priceYen;
              public final String title;
              public final String note;

              public CheckResult(Site site, String status, Integer priceYen, String title, String note) {
                  this.site = site;
                  this.status = status;
                  this.priceYen = priceYen;
                  this.title = title;
                  this.note = note;
              }

              public boolean shouldNotify() {
                  return GOOD.equals(status);
              }

              public String toDisplay() {
                  String price = priceYen == null ? "prezzo non letto" : priceYen + "¥";
                  return site.name + "\n" + status + " - " + price + "\n" + title + "\n" + note + "\n" + site.url;
              }
          }
          EOF

          cat > app/src/main/java/com/salmoit/yugiohwatcher/SiteRepository.java <<'EOF'
          package com.salmoit.yugiohwatcher;

          import java.util.ArrayList;
          import java.util.List;

          public class SiteRepository {
              public static List<Site> defaults() {
                  List<Site> sites = new ArrayList<>();
                  sites.add(new Site("Meccha Japan", "https://meccha-japan.com/en/booster-box/180311-booster-box-original-artwork-collection-yu-gi-oh-ocg.html"));
                  sites.add(new Site("Rakuten Search", "https://search.rakuten.co.jp/search/mall/%E9%81%8A%E6%88%AF%E7%8E%8B+ORIGINAL+ARTWORK+COLLECTION+BOX/"));
                  sites.add(new Site("Yahoo JP Search", "https://shopping.yahoo.co.jp/search?p=%E9%81%8A%E6%88%AF%E7%8E%8B%20ORIGINAL%20ARTWORK%20COLLECTION%20BOX"));
                  sites.add(new Site("Amazon JP Search", "https://www.amazon.co.jp/s?k=Yu-Gi-Oh+ORIGINAL+ARTWORK+COLLECTION+BOX"));
                  sites.add(new Site("Hobby Search", "https://www.1999.co.jp/eng/search?typ1_c=101&cat=&state=&sold=0&sortid=6&searchkey=Yu-Gi-Oh+ORIGINAL+ARTWORK+COLLECTION"));
                  sites.add(new Site("Hobby Genki", "https://hobby-genki.com/en/search?controller=search&s=Yu-Gi-Oh+ORIGINAL+ARTWORK+COLLECTION"));
                  sites.add(new Site("Surugaya", "https://www.suruga-ya.jp/search?category=&search_word=%E9%81%8A%E6%88%AF%E7%8E%8B%20ORIGINAL%20ARTWORK%20COLLECTION"));
                  sites.add(new Site("GRIMSHOP", "https://grimtcd.com/products/%E3%82%A2%E3%82%B8%E3%82%A2%E7%89%88-%E9%81%8A-%E6%88%AF-%E7%8E%8B-original-artwork-collection-%E4%BB%AE"));
                  return sites;
              }
          }
          EOF

          cat > app/src/main/java/com/salmoit/yugiohwatcher/SiteChecker.java <<'EOF'
          package com.salmoit.yugiohwatcher;

          import org.jsoup.Jsoup;
          import org.jsoup.nodes.Document;
          import org.jsoup.nodes.Element;

          import java.util.ArrayList;
          import java.util.HashSet;
          import java.util.List;
          import java.util.Locale;
          import java.util.Set;
          import java.util.regex.Matcher;
          import java.util.regex.Pattern;

          public class SiteChecker {
              public static CheckResult check(Site site, int maxYen) {
                  try {
                      Document doc = Jsoup.connect(site.url)
                              .userAgent("Mozilla/5.0 Android YuGiOhPreorderWatcher")
                              .timeout(18000)
                              .followRedirects(true)
                              .get();

                      String pageTitle = normalize(doc.title());

                      if (isSearchPage(site.url)) {
                          return checkSearchPage(site, maxYen, doc, pageTitle);
                      }

                      String merged = normalize(pageTitle + " " + doc.text());

                      if (!looksLikeExactProduct(merged)) {
                          return new CheckResult(site, CheckResult.NOT_FOUND, null, pageTitle,
                                  "Pagina letta, ma non sembra il prodotto Original Artwork Collection.");
                      }

                      boolean soldOut = containsAny(merged, new String[]{
                              "sold out", "out of stock", "notify me when available", "unavailable",
                              "品切れ", "在庫なし", "売り切れ", "売切れ", "完売", "販売終了", "入荷待ち", "在庫切れ"
                      });

                      Integer price = extractLowestReasonablePrice(merged);

                      if (soldOut) {
                          return new CheckResult(site, CheckResult.SOLD_OUT, price, pageTitle,
                                  "Prodotto trovato, ma sembra esaurito/non disponibile.");
                      }

                      if (price == null) {
                          return new CheckResult(site, CheckResult.MAYBE, null, pageTitle,
                                  "Prodotto forse trovato, ma prezzo non letto. Nessuna notifica automatica.");
                      }

                      if (price <= maxYen) {
                          return new CheckResult(site, CheckResult.GOOD, price, pageTitle,
                                  "Prezzo sotto soglia. Verifica manualmente che sia box sealed/preorder.");
                      }

                      return new CheckResult(site, CheckResult.EXPENSIVE, price, pageTitle,
                              "Prodotto trovato, ma prezzo sopra soglia.");

                  } catch (Exception e) {
                      return new CheckResult(site, CheckResult.ERROR, null, site.name, e.getClass().getSimpleName() + ": " + e.getMessage());
                  }
              }

              private static CheckResult checkSearchPage(Site site, int maxYen, Document doc, String pageTitle) {
                  List<Candidate> candidates = findSearchCandidates(doc);

                  if (candidates.isEmpty()) {
                      return new CheckResult(site, CheckResult.NOT_FOUND, null, pageTitle,
                              "Pagina di ricerca: nessun risultato specifico. Evito falsi alert.");
                  }

                  Candidate bestPriced = null;
                  Candidate firstWithoutPrice = null;

                  for (Candidate c : candidates) {
                      if (c.priceYen == null) {
                          if (firstWithoutPrice == null) firstWithoutPrice = c;
                          continue;
                      }
                      if (bestPriced == null || c.priceYen < bestPriced.priceYen) {
                          bestPriced = c;
                      }
                  }

                  if (bestPriced != null) {
                      boolean soldOut = containsAny(bestPriced.context, new String[]{
                              "sold out", "out of stock", "notify me when available", "unavailable",
                              "品切れ", "在庫なし", "売り切れ", "売切れ", "完売", "販売終了", "入荷待ち", "在庫切れ"
                      });

                      if (soldOut) {
                          return new CheckResult(site, CheckResult.SOLD_OUT, bestPriced.priceYen, bestPriced.title,
                                  "Risultato specifico trovato, ma sembra sold out.");
                      }

                      if (bestPriced.priceYen <= maxYen) {
                          return new CheckResult(site, CheckResult.GOOD, bestPriced.priceYen, bestPriced.title,
                                  "Risultato specifico trovato e prezzo sotto soglia. Apri e verifica box sealed.");
                      }

                      return new CheckResult(site, CheckResult.EXPENSIVE, bestPriced.priceYen, bestPriced.title,
                              "Risultato specifico trovato, ma prezzo sopra soglia.");
                  }

                  return new CheckResult(site, CheckResult.MAYBE, null, firstWithoutPrice == null ? pageTitle : firstWithoutPrice.title,
                          "Risultato specifico trovato, ma prezzo non letto. Nessuna notifica automatica.");
              }

              private static List<Candidate> findSearchCandidates(Document doc) {
                  List<Candidate> out = new ArrayList<>();
                  Set<String> seen = new HashSet<>();

                  for (Element a : doc.select("a[href]")) {
                      StringBuilder titleBuilder = new StringBuilder();
                      titleBuilder.append(a.text());

                      for (Element img : a.select("img[alt]")) {
                          String alt = img.attr("alt");
                          if (alt != null && alt.trim().length() > 0) {
                              titleBuilder.append(' ').append(alt);
                          }
                      }

                      String title = normalize(titleBuilder.toString());
                      if (!looksLikeExactProduct(title)) continue;

                      String context = title;
                      Element current = a;
                      for (int depth = 0; depth < 4 && current != null; depth++) {
                          String t = normalize(current.text());
                          if (t.length() > context.length() && t.length() < 5000) context = t;
                          current = current.parent();
                      }

                      String href = a.absUrl("href");
                      String key = href + "|" + title;
                      if (seen.contains(key)) continue;
                      seen.add(key);

                      out.add(new Candidate(title, context, extractLowestReasonablePrice(context)));
                  }

                  return out;
              }

              private static boolean isSearchPage(String url) {
                  String u = url == null ? "" : url.toLowerCase(Locale.ROOT);
                  return u.contains("search.rakuten.co.jp")
                          || u.contains("shopping.yahoo.co.jp/search")
                          || u.contains("amazon.co.jp/s?")
                          || u.contains("suruga-ya.jp/search")
                          || u.contains("1999.co.jp") && u.contains("search")
                          || u.contains("hobby-genki.com") && u.contains("search");
              }

              private static boolean looksLikeExactProduct(String text) {
                  if (text == null) return false;
                  String upper = text.toUpperCase(Locale.ROOT);

                  boolean hasProductName = upper.contains("ORIGINAL ARTWORK COLLECTION")
                          || text.contains("オリジナルアートワークコレクション")
                          || text.contains("オリジナルアートワーク");

                  boolean hasYugioh = upper.contains("YU-GI-OH")
                          || upper.contains("YUGIOH")
                          || text.contains("遊戯王")
                          || text.contains("遊☆戯☆王")
                          || text.contains("遊 戯 王")
                          || text.contains("遊-戯-王");

                  boolean hasBoxSignal = upper.contains("BOX")
                          || upper.contains("BOOSTER BOX")
                          || text.contains("ボックス")
                          || text.contains("1BOX")
                          || text.contains("１BOX");

                  return hasProductName && (hasYugioh || hasBoxSignal);
              }

              private static Integer extractLowestReasonablePrice(String text) {
                  String converted = toHalfWidth(text);
                  Pattern p = Pattern.compile("(?:[¥￥]\\s*([0-9][0-9,]{2,7})|([0-9][0-9,]{2,7})\\s*(?:円|yen|JPY))", Pattern.CASE_INSENSITIVE);
                  Matcher m = p.matcher(converted);

                  Integer best = null;
                  while (m.find()) {
                      String raw = m.group(1) != null ? m.group(1) : m.group(2);
                      try {
                          int value = Integer.parseInt(raw.replace(",", ""));
                          if (value >= 1000 && value <= 50000) {
                              if (best == null || value < best) best = value;
                          }
                      } catch (Exception ignored) {}
                  }
                  return best;
              }

              private static String toHalfWidth(String s) {
                  StringBuilder sb = new StringBuilder();
                  for (char c : s.toCharArray()) {
                      if (c >= '０' && c <= '９') sb.append((char) ('0' + (c - '０')));
                      else if (c == '，') sb.append(',');
                      else sb.append(c);
                  }
                  return sb.toString();
              }

              private static boolean containsAny(String text, String[] words) {
                  String lower = text.toLowerCase(Locale.ROOT);
                  for (String w : words) {
                      if (lower.contains(w.toLowerCase(Locale.ROOT))) return true;
                  }
                  return false;
              }

              private static String normalize(String s) {
                  if (s == null) return "";
                  return s.replace('\u00A0', ' ').replaceAll("\\s+", " ").trim();
              }

              private static final class Candidate {
                  final String title;
                  final String context;
                  final Integer priceYen;

                  Candidate(String title, String context, Integer priceYen) {
                      this.title = title;
                      this.context = context;
                      this.priceYen = priceYen;
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/salmoit/yugiohwatcher/NotificationHelper.java <<'EOF'
          package com.salmoit.yugiohwatcher;

          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Context;
          import android.os.Build;

          public class NotificationHelper {
              public static final String CHANNEL_ID = "price_alerts";

              public static void ensureChannel(Context ctx) {
                  if (Build.VERSION.SDK_INT >= 26) {
                      NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                      NotificationChannel ch = new NotificationChannel(CHANNEL_ID, "Preorder alerts", NotificationManager.IMPORTANCE_HIGH);
                      nm.createNotificationChannel(ch);
                  }
              }
          }
          EOF

          cat > app/src/main/java/com/salmoit/yugiohwatcher/CheckWorker.java <<'EOF'
          package com.salmoit.yugiohwatcher;

          import android.app.NotificationManager;
          import android.content.Context;
          import android.content.SharedPreferences;

          import androidx.annotation.NonNull;
          import androidx.core.app.NotificationCompat;
          import androidx.work.Worker;
          import androidx.work.WorkerParameters;

          public class CheckWorker extends Worker {
              public CheckWorker(@NonNull Context context, @NonNull WorkerParameters params) {
                  super(context, params);
              }

              @NonNull
              @Override
              public Result doWork() {
                  Context ctx = getApplicationContext();
                  NotificationHelper.ensureChannel(ctx);

                  SharedPreferences prefs = ctx.getSharedPreferences("settings", Context.MODE_PRIVATE);
                  int threshold = prefs.getInt("threshold_yen", 8000);

                  int id = 100;
                  for (Site site : SiteRepository.defaults()) {
                      CheckResult r = SiteChecker.check(site, threshold);
                      if (r.shouldNotify()) {
                          NotificationCompat.Builder b = new NotificationCompat.Builder(ctx, NotificationHelper.CHANNEL_ID)
                                  .setSmallIcon(android.R.drawable.ic_dialog_info)
                                  .setContentTitle("Yu-Gi-Oh preorder trovato")
                                  .setContentText(site.name + " - " + r.priceYen + "¥")
                                  .setStyle(new NotificationCompat.BigTextStyle().bigText(r.toDisplay()))
                                  .setPriority(NotificationCompat.PRIORITY_HIGH)
                                  .setAutoCancel(true);

                          NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                          nm.notify(id++, b.build());
                      }
                  }

                  return Result.success();
              }
          }
          EOF

          cat > app/src/main/java/com/salmoit/yugiohwatcher/MainActivity.java <<'EOF'
          package com.salmoit.yugiohwatcher;

          import android.Manifest;
          import android.app.Activity;
          import android.content.SharedPreferences;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;

          import androidx.work.ExistingPeriodicWorkPolicy;
          import androidx.work.PeriodicWorkRequest;
          import androidx.work.WorkManager;

          import java.util.concurrent.Executors;
          import java.util.concurrent.TimeUnit;

          public class MainActivity extends Activity {
              private TextView output;
              private EditText thresholdInput;
              private SharedPreferences prefs;

              @Override
              protected void onCreate(Bundle b) {
                  super.onCreate(b);

                  prefs = getSharedPreferences("settings", MODE_PRIVATE);
                  NotificationHelper.ensureChannel(this);

                  if (Build.VERSION.SDK_INT >= 33) {
                      requestPermissions(new String[]{Manifest.permission.POST_NOTIFICATIONS}, 10);
                  }

                  scheduleWorker();

                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(32, 32, 32, 32);

                  TextView title = new TextView(this);
                  title.setText("Yu-Gi-Oh Original Artwork Watcher");
                  title.setTextSize(22);
                  root.addView(title);

                  thresholdInput = new EditText(this);
                  thresholdInput.setHint("Soglia prezzo in yen");
                  thresholdInput.setInputType(android.text.InputType.TYPE_CLASS_NUMBER);
                  thresholdInput.setText(String.valueOf(prefs.getInt("threshold_yen", 8000)));
                  root.addView(thresholdInput);

                  Button save = new Button(this);
                  save.setText("Salva soglia");
                  root.addView(save);

                  Button check = new Button(this);
                  check.setText("Controlla ora");
                  root.addView(check);

                  output = new TextView(this);
                  output.setText("Soglia consigliata: 8000¥.\nL'app notifica solo PREZZO OK, non i risultati dubbi.");
                  output.setTextSize(14);

                  ScrollView scroll = new ScrollView(this);
                  scroll.addView(output);
                  root.addView(scroll, new LinearLayout.LayoutParams(
                          LinearLayout.LayoutParams.MATCH_PARENT, 0, 1
                  ));

                  setContentView(root);

                  save.setOnClickListener(v -> {
                      int t = parseThreshold();
                      prefs.edit().putInt("threshold_yen", t).apply();
                      output.setText("Soglia salvata: " + t + "¥");
                  });

                  check.setOnClickListener(v -> runManualCheck());
              }

              private int parseThreshold() {
                  try {
                      return Integer.parseInt(thresholdInput.getText().toString().trim());
                  } catch (Exception e) {
                      return 8000;
                  }
              }

              private void runManualCheck() {
                  int threshold = parseThreshold();
                  prefs.edit().putInt("threshold_yen", threshold).apply();
                  output.setText("Controllo in corso...");

                  Executors.newSingleThreadExecutor().execute(() -> {
                      StringBuilder sb = new StringBuilder();
                      for (Site site : SiteRepository.defaults()) {
                          CheckResult r = SiteChecker.check(site, threshold);
                          sb.append(r.toDisplay()).append("\n\n----------------------\n\n");
                      }
                      runOnUiThread(() -> output.setText(sb.toString()));
                  });
              }

              private void scheduleWorker() {
                  PeriodicWorkRequest req = new PeriodicWorkRequest.Builder(CheckWorker.class, 6, TimeUnit.HOURS).build();
                  WorkManager.getInstance(this).enqueueUniquePeriodicWork(
                          "yu_gi_oh_price_check",
                          ExistingPeriodicWorkPolicy.UPDATE,
                          req
                  );
              }
          }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YuGiOhPreorderWatcher-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
